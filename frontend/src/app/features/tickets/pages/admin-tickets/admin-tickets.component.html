<!-- src/app/features/tickets/pages/admin-tickets/admin-tickets.component.html -->
<div class="min-h-full bg-gradient-to-b from-ital-cream/60 to-transparent">
  <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-8">

    <!-- Hero header -->
    <div class="mb-6 flex items-center gap-3.5">
      <div class="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-slate-700 to-slate-900 text-white shadow-lg shadow-slate-900/20">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-800">Administración de tickets</h1>
        <p class="text-sm text-ital-muted">Vista global de todos los países de la empresa.</p>
      </div>
    </div>

    <!-- Filtros -->
    <div class="mb-5 flex flex-wrap items-end gap-3 rounded-2xl bg-white p-3.5 shadow-sm ring-1 ring-slate-200/70">
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Año</label>
        <select [(ngModel)]="anio" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          @for (a of anios; track a) { <option [ngValue]="a">{{ a }}</option> }
        </select>
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Estado</label>
        <select [(ngModel)]="estado" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          <option value="">Todos</option>
          @for (e of estados; track e) { <option [ngValue]="e">{{ estadoLabel[e] }}</option> }
        </select>
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Tipo</label>
        <select [(ngModel)]="tipo" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          <option value="">Todos</option>
          @for (t of tipos; track t.value) { <option [ngValue]="t.value">{{ t.label }}</option> }
        </select>
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">País (Id)</label>
        <input type="number" [(ngModel)]="paisId" (ngModelChange)="onFilterChange()" placeholder="Todos" min="1"
               class="w-24 rounded-lg border-slate-200 py-1.5 pl-3 pr-2 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green" />
      </div>
    </div>

    <app-ticket-list
      [items]="data()?.items ?? []"
      [loading]="loading()"
      [page]="page"
      [totalPages]="totalPages()"
      [total]="data()?.total ?? 0"
      [showAsignado]="true"
      [showPais]="true"
      emptyText="No hay tickets para este filtro."
      (prev)="prevPage()"
      (next)="nextPage()">
    </app-ticket-list>
  </div>
</div>
