<!-- src/app/features/tickets/pages/gestion-tickets/gestion-tickets.component.html -->
<div class="min-h-full bg-gradient-to-b from-ital-cream/60 to-transparent">
  <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-8">

    <!-- Hero header -->
    <div class="mb-6 flex items-center gap-3.5">
      <div class="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-ital-green to-ital-green-dark text-white shadow-lg shadow-ital-green/25">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-800">Bandeja de gestión</h1>
        <p class="text-sm text-ital-muted">Tickets asignados a mí para atender y resolver.</p>
      </div>
    </div>

    <!-- Filtros -->
    <div class="mb-5 flex flex-wrap items-end gap-3 rounded-2xl bg-white p-3.5 shadow-sm ring-1 ring-slate-200/70">
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Año</label>
        <select [(ngModel)]="anio" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          @for (a of anios; track a) { <option [ngValue]="a">{{ a }}</option> }
        </select>
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Estado</label>
        <select [(ngModel)]="estado" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          <option value="">Todos</option>
          @for (e of estados; track e) { <option [ngValue]="e">{{ estadoLabel[e] }}</option> }
        </select>
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-ital-muted">Tipo</label>
        <select [(ngModel)]="tipo" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          <option value="">Todos</option>
          @for (t of tipos; track t.value) { <option [ngValue]="t.value">{{ t.label }}</option> }
        </select>
      </div>
    </div>

    <app-ticket-list
      [items]="data()?.items ?? []"
      [loading]="loading()"
      [page]="page"
      [totalPages]="totalPages()"
      [total]="data()?.total ?? 0"
      [showAsignado]="true"
      emptyText="No hay tickets en tu bandeja para este filtro."
      (prev)="prevPage()"
      (next)="nextPage()">
    </app-ticket-list>
  </div>
</div>
