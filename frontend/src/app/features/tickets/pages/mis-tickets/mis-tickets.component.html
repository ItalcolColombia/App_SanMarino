<!-- src/app/features/tickets/pages/mis-tickets/mis-tickets.component.html -->
<div class="min-h-full bg-white bg-gradient-to-b from-ital-orange-50 via-white to-white">
  <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-8">

    <!-- Hero header -->
    <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3.5">
        <div class="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-ital-orange to-ital-orange-dark text-white shadow-lg shadow-ital-orange/25">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2Z" />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-slate-800">Mis solicitudes</h1>
          <p class="text-sm text-ital-muted">Seguí el estado de tus tickets de soporte y requerimientos.</p>
        </div>
      </div>
      <a routerLink="/tickets/nuevo"
         class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-br from-ital-green to-ital-green-dark px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-ital-green/25 transition-all hover:-translate-y-0.5 hover:shadow-xl hover:shadow-ital-green/30">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        Nuevo ticket
      </a>
    </div>

    <!-- Toolbar: año + total -->
    <div class="mb-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <span class="text-xs font-medium text-ital-muted">Año</span>
        <select [(ngModel)]="anio" (ngModelChange)="onFilterChange()"
                class="rounded-lg border-slate-200 bg-white py-1.5 pl-3 pr-8 text-sm font-medium text-slate-700 shadow-sm focus:border-ital-green focus:ring-ital-green">
          @for (a of anios; track a) { <option [ngValue]="a">{{ a }}</option> }
        </select>
      </div>
      @if (data()) {
        <span class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-600 ring-1 ring-slate-200">
          {{ data()!.total }} ticket(s)
        </span>
      }
    </div>

    <!-- Filtro de estado segmentado -->
    <div class="mb-5 -mx-1 flex gap-1.5 overflow-x-auto px-1 pb-1">
      <button (click)="selectEstado('')"
              class="shrink-0 rounded-full px-3 py-1.5 text-xs font-semibold ring-1 transition"
              [class.bg-ital-green]="estado === ''" [class.text-white]="estado === ''" [class.ring-ital-green]="estado === ''"
              [class.bg-white]="estado !== ''" [class.text-slate-600]="estado !== ''" [class.ring-slate-200]="estado !== ''">
        Todos
      </button>
      @for (e of estados; track e) {
        <button (click)="selectEstado(e)"
                class="inline-flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-semibold ring-1 transition"
                [class.bg-ital-green]="estado === e" [class.text-white]="estado === e" [class.ring-ital-green]="estado === e"
                [class.bg-white]="estado !== e" [class.text-slate-600]="estado !== e" [class.ring-slate-200]="estado !== e">
          <span class="h-1.5 w-1.5 rounded-full" [class]="estadoDot[e]"></span>
          {{ estadoLabel[e] }}
        </button>
      }
    </div>

    <!-- Listado compartido -->
    <app-ticket-list
      [items]="data()?.items ?? []"
      [loading]="loading()"
      [page]="page"
      [totalPages]="totalPages()"
      [total]="data()?.total ?? 0"
      emptyText="No tenés tickets para este filtro. ¡Creá el primero!"
      (prev)="prevPage()"
      (next)="nextPage()">
    </app-ticket-list>
  </div>
</div>
