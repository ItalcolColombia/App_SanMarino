<div class="gestion-granjas" [class.embedded]="embedded">
  <app-sidebar class="gestion-granjas__sidebar" *ngIf="!embedded"></app-sidebar>

  <main class="gestion-granjas__main">
    <!-- Header: título y contexto -->
    <header class="page-header">
      <div class="page-header__content">
        <div class="page-header__text">
          <h1 class="page-header__title">Gestión de Granjas</h1>
          <p class="page-header__subtitle">Administra granjas, núcleos y galpones en una sola vista.</p>
        </div>
        <div class="page-header__accent" aria-hidden="true"></div>
      </div>
    </header>

    <!-- Tabs: navegación por secciones -->
    <nav class="tabs-nav" role="tablist" aria-label="Secciones de gestión">
      <button
        class="tabs-nav__tab"
        role="tab"
        [attr.aria-selected]="isActive('granjas')"
        [class.tabs-nav__tab--active]="isActive('granjas')"
        (click)="setTab('granjas')"
        id="tab-granjas"
        aria-controls="panel-granjas">
        <span class="tabs-nav__icon" aria-hidden="true">
          <fa-icon [icon]="faHome"></fa-icon>
        </span>
        <span class="tabs-nav__label">Granjas</span>
      </button>

      <button
        class="tabs-nav__tab"
        role="tab"
        [attr.aria-selected]="isActive('nucleos')"
        [class.tabs-nav__tab--active]="isActive('nucleos')"
        (click)="setTab('nucleos')"
        id="tab-nucleos"
        aria-controls="panel-nucleos">
        <span class="tabs-nav__icon" aria-hidden="true">
          <fa-icon [icon]="faPuzzle"></fa-icon>
        </span>
        <span class="tabs-nav__label">Núcleos</span>
      </button>

      <button
        class="tabs-nav__tab"
        role="tab"
        [attr.aria-selected]="isActive('galpones')"
        [class.tabs-nav__tab--active]="isActive('galpones')"
        (click)="setTab('galpones')"
        id="tab-galpones"
        aria-controls="panel-galpones">
        <span class="tabs-nav__icon" aria-hidden="true">
          <fa-icon [icon]="faWarehouse"></fa-icon>
        </span>
        <span class="tabs-nav__label">Galpones</span>
      </button>
    </nav>

    <!-- Paneles de contenido -->
    <section
      class="tab-panel"
      id="panel-granjas"
      role="tabpanel"
      [attr.aria-labelledby]="'tab-granjas'"
      [hidden]="!isActive('granjas')">
      <div class="tab-panel__inner">
        <app-farm-list></app-farm-list>
      </div>
    </section>

    <section
      class="tab-panel"
      id="panel-nucleos"
      role="tabpanel"
      [attr.aria-labelledby]="'tab-nucleos'"
      [hidden]="!isActive('nucleos')">
      <div class="tab-panel__inner">
        <app-nucleo-list></app-nucleo-list>
      </div>
    </section>

    <section
      class="tab-panel"
      id="panel-galpones"
      role="tabpanel"
      [attr.aria-labelledby]="'tab-galpones'"
      [hidden]="!isActive('galpones')">
      <div class="tab-panel__inner">
        <app-galpon-list></app-galpon-list>
      </div>
    </section>
  </main>
</div>
