# =============================================================================
# CI/CD Pipeline — San Marino App (Producción)
# =============================================================================
# Dispara cuando se hace push o merge a la rama main-produccion.
# Construye las imágenes Docker de frontend y backend, las publica en ECR
# y actualiza los servicios ECS con rolling deployment automático.
#
# Prerequisitos:
#   1. OIDC provider configurado en IAM para token.actions.githubusercontent.com
#   2. Rol IAM  github-actions-deploy  con la política adjunta (ver docs/iam-policy.json)
#   3. Los servicios ECS y task definitions ya deben existir en AWS
# =============================================================================

name: Deploy to Production

on:
  push:
    branches:
      - main-produccion
  # Permite disparar manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "Desplegar backend"
        type: boolean
        default: true
      deploy_frontend:
        description: "Desplegar frontend"
        type: boolean
        default: true

# OIDC requiere este permiso para solicitar el JWT
permissions:
  id-token: write
  contents: read

# ─── Variables compartidas entre jobs ────────────────────────────────────────
env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "196080479890"
  ECS_CLUSTER: devSanmarinoZoo

# =============================================================================
# JOB 1 — Backend: Build → ECR → ECS
# =============================================================================
jobs:
  deploy-backend:
    name: "Backend — Build & Deploy"
    runs-on: ubuntu-latest
    # En push automático siempre despliega; en manual respeta el input
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == true)
    timeout-minutes: 30

    env:
      ECR_REPOSITORY: sanmarino/zootecnia/granjas/backend
      ECS_SERVICE: sanmarino-back-task-service-75khncfa
      ECS_TASK_FAMILY: sanmarino-back-task
      CONTAINER_NAME: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ── Autenticación AWS vía OIDC (sin claves estáticas) ──────────────────
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Backend-${{ github.run_number }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Calcular tags de imagen ─────────────────────────────────────────────
      # Se usan dos tags: el SHA del commit (trazabilidad) y latest (referencia rápida)
      - name: Calcular tags de imagen
        id: tags
        run: |
          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="${{ github.sha }}"

          echo "image_sha=${REGISTRY}/${REPO}:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}"                    >> "$GITHUB_OUTPUT"

          echo "### Backend Image Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${SHA}\`"      >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${REGISTRY}/${REPO}:${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      # ── Build Docker ────────────────────────────────────────────────────────
      # Se usa --cache-from para reutilizar capas de la imagen latest anterior.
      # --platform linux/amd64 garantiza compatibilidad con Fargate x86_64.
      - name: Pull imagen anterior (cache)
        run: docker pull ${{ steps.tags.outputs.image_latest }} || true

      - name: Build imagen Docker
        working-directory: backend
        run: |
          docker build \
            --platform linux/amd64 \
            --file Dockerfile \
            --cache-from ${{ steps.tags.outputs.image_latest }} \
            --tag ${{ steps.tags.outputs.image_sha }} \
            --tag ${{ steps.tags.outputs.image_latest }} \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.run=${{ github.run_number }}" \
            .

      # ── Push a ECR ──────────────────────────────────────────────────────────
      - name: Push imágenes a ECR
        run: |
          docker push ${{ steps.tags.outputs.image_sha }}
          docker push ${{ steps.tags.outputs.image_latest }}

      # ── Desplegar en ECS ────────────────────────────────────────────────────
      # Estrategia: descargar task definition actual de ECS, actualizar sólo
      # el campo image, registrar nueva revisión y actualizar el servicio.
      # Así los secretos y variables de entorno no tocan GitHub Actions.
      - name: Obtener task definition actual de ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query 'taskDefinition' \
            --output json \
            | jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )' \
            > /tmp/task-def-backend.json

          echo "Task definition descargada correctamente."

      - name: Actualizar imagen en task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-def-backend.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.tags.outputs.image_sha }}

      - name: Desplegar en ECS (rolling deployment)
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15
          force-new-deployment: true

      - name: Resumen de despliegue
        if: success()
        run: |
          echo "### Backend desplegado exitosamente" >> "$GITHUB_STEP_SUMMARY"
          echo "- Servicio: \`${{ env.ECS_SERVICE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cluster: \`${{ env.ECS_CLUSTER }}\`"  >> "$GITHUB_STEP_SUMMARY"
          echo "- Imagen: \`${{ steps.tags.outputs.image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 2 — Frontend: Build → ECR → ECS
  # ===========================================================================
  deploy-frontend:
    name: "Frontend — Build & Deploy"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true)
    timeout-minutes: 30

    env:
      ECR_REPOSITORY: sanmarino/zootecnia/granjas/frontend
      ECS_SERVICE: sanmarino-front-task-service-zp2f403l
      ECS_TASK_FAMILY: sanmarino-front-task
      CONTAINER_NAME: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Frontend-${{ github.run_number }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Calcular tags de imagen
        id: tags
        run: |
          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="${{ github.sha }}"

          echo "image_sha=${REGISTRY}/${REPO}:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}"                    >> "$GITHUB_OUTPUT"

          echo "### Frontend Image Tags" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${SHA}\`"       >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${REGISTRY}/${REPO}:${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Pull imagen anterior (cache)
        run: docker pull ${{ steps.tags.outputs.image_latest }} || true

      # El Dockerfile del frontend usa  --configuration docker  (angular.json)
      # que genera el bundle de producción con environment.prod.ts
      - name: Build imagen Docker
        working-directory: frontend
        run: |
          docker build \
            --platform linux/amd64 \
            --file Dockerfile \
            --cache-from ${{ steps.tags.outputs.image_latest }} \
            --tag ${{ steps.tags.outputs.image_sha }} \
            --tag ${{ steps.tags.outputs.image_latest }} \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.run=${{ github.run_number }}" \
            .

      - name: Push imágenes a ECR
        run: |
          docker push ${{ steps.tags.outputs.image_sha }}
          docker push ${{ steps.tags.outputs.image_latest }}

      - name: Obtener task definition actual de ECS
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query 'taskDefinition' \
            --output json \
            | jq 'del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )' \
            > /tmp/task-def-frontend.json

          echo "Task definition descargada correctamente."

      - name: Actualizar imagen en task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-def-frontend.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.tags.outputs.image_sha }}

      - name: Desplegar en ECS (rolling deployment)
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15
          force-new-deployment: true

      - name: Resumen de despliegue
        if: success()
        run: |
          echo "### Frontend desplegado exitosamente" >> "$GITHUB_STEP_SUMMARY"
          echo "- Servicio: \`${{ env.ECS_SERVICE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cluster: \`${{ env.ECS_CLUSTER }}\`"  >> "$GITHUB_STEP_SUMMARY"
          echo "- Imagen: \`${{ steps.tags.outputs.image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
